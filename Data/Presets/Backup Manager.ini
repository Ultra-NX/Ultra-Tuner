;color=#FFAA00
;show_widget=true


[@Manager]


[Header]
;mode=table
;background=false
;header_indent=true
;polling=true
ini_file '/switch/.packages/Ultra Tuner/config.ini'
'Selected:'= '{slice({ini_file(Backup,Current)},27,100)}'


[Gap]
;mode=table
;background=false
;gap=0

[*Select Backup]
;grouping=split
;mini=true
file_source /atmosphere/kips/.bak/*.ini
set-ini-val '/switch/.packages/Ultra Tuner/config.ini' Backup Current '{file_source}'
ini_file '/switch/.packages/Ultra Tuner/config.ini'
back



[Gap]
;mode=table
;background=false
;gap=5

[Info]
;mode=table
;background=false
;end_gap=5
;gap=17
'Backups Location'= '/atmosphere/kips/.bak/'



[*Restore Backup]
;mini=true
;grouping=split
file_source /atmosphere/kips/.bak/*.ini
file_source /atmosphere/kips/.bakTK/*.ini

ini_file '{file_source}'
cp {file_source} /atmosphere/kips/.bak/Temp.ini
set-ini-val '/switch/.packages/Ultra Tuner/config.ini' Backup Current '{file_source}'


json '[{"null":"converter-SC", "HOC-1.2.1":"restore"}]'

set-ini-val '/switch/.packages/Ultra Tuner/config.ini' Backup Version '{json(0,{ini_file(Backup,Version)})}'
ini_file '/switch/.packages/Ultra Tuner/config.ini'
exec '{ini_file(Backup,Version)}'
exec restore

del /atmosphere/kips/.bak/Temp.ini



[*Rename Selected To:]
;mini=true
list_file_source './backup names.txt'

ini_file '/switch/.packages/Ultra Tuner/config.ini'
mv '{ini_file(Backup,Current)}' '/atmosphere/kips/.bak/Backup {list_file_source(*)}.ini'
set-ini-val '/switch/.packages/Ultra Tuner/config.ini' Backup Current 'sdmc:/atmosphere/kips/.bak/Backup {list_file_source(*)}.ini'



[*Delete Backup]
;mini=true
;grouping=split
file_source /atmosphere/kips/.bak/*.ini
file_source /atmosphere/kips/.bakTK/*.ini

del {file_source}



[*Overwrite Backup]
;mini=true
file_source /atmosphere/kips/.bak/*.ini

set-ini-val '/switch/.packages/Ultra Tuner/config.ini' Backup Current '{file_source}'

exec backup

mv /atmosphere/kips/.bak/Current.ini '{file_source}'



[Create Backup]
;mini=true
set-ini-val '/switch/.packages/Ultra Tuner/config.ini' Backup Current 'sdmc:/atmosphere/kips/.bak/Backup {timestamp("%y.%m.%d [%H-%M]")}.ini'

exec backup

ini_file '/switch/.packages/Ultra Tuner/config.ini'
mv /atmosphere/kips/.bak/Current.ini '{ini_file(Backup,Current)}'





[Gap]
;mode=table
;background=false
;gap=100

[Header]
;mode=table
;header_indent=true
;background=false
;info_text_color=#AAAAAA
'RAM' = 'In Selected Backup'


[Info]
;mode=table
;polling=true
;spacing=1
;gap=0
ini_file '/switch/.packages/Ultra Tuner/config.ini'
ini_file '{ini_file(Backup,Current)}'


mariko:
'Maximum MHz'= '{slice({hex_to_decimal({hex_to_rhex({ini_file(Backup,marikoEmcMaxClock)})})},0,4)} MHz'
json_file './Boot Jsons/RAM Vdd.json'
'Vdd2/Vddq Voltage'= '{json_file(0,{ini_file(Backup,commonEmcMemVolt)})}/{json_file(0,{ini_file(Backup,marikoEmcVddqVolt)})} mV'
json_file './Boot Jsons/RAM DVB.json'
'EMC DVB Table'= '{json_file(0,{ini_file(Backup,emcDvbShift)})}'
json_file './Boot Jsons/RAM Latency.json'
'Read/Write Latency' = '{json_file(0,{ini_file(Backup,mem_burst_read_latency)})}/{json_file(0,{ini_file(Backup,mem_burst_write_latency)})}'

json_file './Boot Jsons/RAM Timings.json'
'Timings' = '({json_file(0,{ini_file(Backup,t1_tRCD)})}-{json_file(0,{ini_file(Backup,t2_tRP)})}-{json_file(0,{ini_file(Backup,t3_tRAS)})}) {json_file(0,{ini_file(Backup,t4_tRRD)})}-{json_file(0,{ini_file(Backup,t5_tRFC)})}-{json_file(0,{ini_file(Backup,t6_tRTW)})}-{json_file(0,{ini_file(Backup,t7_tWTR)})}-{json_file(0,{ini_file(Backup,t8_tREFI)})} [{json_file(0,{ini_file(Backup,t6_tRTW_fine_tune)})}/{json_file(0,{ini_file(Backup,t7_tWTR_fine_tune)})}]'



erista:
'Maximum MHz'= '{slice({hex_to_decimal({hex_to_rhex({ini_file(Backup,eristaEmcMaxClock)})})},0,4)} MHz'
json_file './Boot Jsons/RAM Vdd.json'
