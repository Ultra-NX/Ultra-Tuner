[*Restore Table from Backup]
;grouping=split
file_source /atmosphere/kips/.bak/*.ini

cp {file_source} /atmosphere/kips/.bak/Temp.ini
set-ini-val '/switch/.packages/Ultra Tuner/config.ini' Backup Current '{file_source}'

mv ./boot_package.ini ./boot_package-bak.ini
cp '/switch/.packages/Ultra Tuner/Data/Presets/boot_package.ini' ./boot_package.ini
exec restore-UV3
mv ./boot_package-bak.ini ./boot_package.ini

exec UV3

del /atmosphere/kips/.bak/Temp.ini





