;color=#00AAFF
;show_widget=true



[@CPU]

[Gap]
;mode=table
;background=false
;gap=5

[Header]
;mode=table
;background=false
;header_indent=true
;gap=17
'CPU'= 'Info {DRIGHT}'

[*Maximum MHz]
;mode=option
;selection_mini=true
mariko:
json_file_source './CPU/CPU MHz M.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 184 {json_file_source(*,dec)}
set-footer '{json_file_source(*,label)}'
back
erista:
json_file_source './CPU/CPU MHz E.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 156 {json_file_source(*,dec)}
set-footer '{json_file_source(*,name)}'
back


[*Boost MHz]
;mode=option
;selection_mini=true
mariko:
json_file_source './CPU/CPU Boost M.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 192 {json_file_source(*,dec)}
set-footer '{json_file_source(*,label)}'
back
erista:
json_file_source './CPU/CPU Boost E.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 188 {json_file_source(*,dec)}
set-footer '{json_file_source(*,label)}'
back


[Undervolt Mode?CPU]
;mode=named_step_trackbar
;unlocked=true
