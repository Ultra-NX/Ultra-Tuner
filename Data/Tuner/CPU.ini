[Gap]
;mode=table
;background=false
;gap=25

[Header]
;mode=table
;background=false
;header_indent=true
;gap=17
;spacing=5
'Applied immediately' = ''
'' = 'Boost CPU when RAM MHz rises'

[Boost CPU → RAM OC?CPU]
;system=mariko
;mode=toggle
on:
    set-ini-val '/config/horizon-oc/config.ini' values auto_high_ram_cpu_oc 1
off:
    set-ini-val '/config/horizon-oc/config.ini' values auto_high_ram_cpu_oc 0

[*CPU Boost MHz?CPU]
;system=mariko
;mode=option
;selection_mini=true
json_file_source './CPU/CPU Boost RAM OC.json' name
set-ini-val '/config/horizon-oc/config.ini' values auto_ram_cpu_cpu_oc_freq {json_file_source(*,dec)}
set-footer '{json_file_source(*,label)}'
back

[*RAM Threshold?CPU]
;system=mariko
;mode=option
;selection_mini=true
json_file_source './RAM/RAM MHz M.json' name
set-ini-val '/config/horizon-oc/config.ini' values auto_ram_cpu_ram_oc_threshold {json_file_source(*,dec)}000
set-footer '{json_file_source(*,dec)} MHz'
back





