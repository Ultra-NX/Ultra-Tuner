;color=#FF0066
;show_widget=true



[@RAM]

[Gap]
;mode=table
;background=false
;gap=5

[Header]
;mode=table
;background=false
;header_indent=true
;gap=17
'RAM'= 'Info {DRIGHT}'

[*Maximum MHz?RAM]
;mode=option
;selection_mini=true
mariko:
json_file_source './RAM/RAM MHz M.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 32 '{json_file_source(*,dec)}000'
set-footer '{json_file_source(*,dec)} MHz'
back
erista:
json_file_source './RAM/RAM MHz E.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 20 '{json_file_source(*,dec)}'
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 24 '{json_file_source(*,dec)}'
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 28 '{json_file_source(*,dec)}'
set-footer '{json_file_source(*,label)}'
back


[DRAM HP Mode]
;mode=toggle
on:
    hex-by-custom-offset /atmosphere/kips/hoc.kip CUST 12 01
off:
    hex-by-custom-offset /atmosphere/kips/hoc.kip CUST 12 00


[*Vdd2 Voltage]
;mode=option
;selection_mini=true
mariko:
json_file_source './RAM/RAM Vdd2 M.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 16 {json_file_source(*,dec)}
set-footer '{json_file_source(*,label)}'
back
erista:
json_file_source './RAM/RAM Vdd2 E.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 16 {json_file_source(*,dec)}
set-footer '{json_file_source(*,label)}'
back


[*Vddq Voltage]
;mode=option
;system=mariko
;selection_mini=true
json_file_source './RAM/RAM Vddq.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 36 {json_file_source(*,dec)}
set-footer '{json_file_source(*,label)}'
back


[*EMC DVB Table]
;mode=option
json_file_source './RAM/RAM DVB.json' name
hex-by-custom-offset /atmosphere/kips/hoc.kip CUST 40 {json_file_source(*,hex)}
set-footer '{json_file_source(*,label)}'
back


[*Read Latency]
;mode=option
;selection_mini=true
json_file_source './RAM/RAM LatRL.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 76 {json_file_source(*,dec)}
set-footer '{json_file_source(*,label)}'
back


[*Write Latency]
;mode=option
;selection_mini=true
json_file_source './RAM/RAM LatWL.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 80 {json_file_source(*,dec)}
set-footer '{json_file_source(*,label)}'
back



[Gap]
;mode=table
;background=false
;gap=20

[Header]
;mode=table
;background=false
;header_indent=true
;polling=true
;info_text_color=#AAAAAA
;gap=17
hex_file '/atmosphere/kips/hoc.kip'
json_file '/switch/.packages/Ultra Tuner/Data/Presets/Boot Jsons/RAM Timings.json'
'Primary Timings'= '({json_file(0,{hex_file(CUST,44,1)})}-{json_file(0,{hex_file(CUST,48,1)})}-{json_file(0,{hex_file(CUST,52,1)})})-{json_file(0,{hex_file(CUST,56,1)})}-{json_file(0,{hex_file(CUST,60,1)})}-{json_file(0,{hex_file(CUST,64,1)})}-{json_file(0,{hex_file(CUST,68,1)})}-{json_file(0,{hex_file(CUST,72,1)})}'

[T1 tRCD]
;mode=named_step_trackbar
;unlocked=true
json_file_source './RAM/T1 tRCD.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 44 {json_file_source(*,dec)}


