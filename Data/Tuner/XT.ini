;color=#FF0066
;show_widget=true



[@RAM]





[Advanced Settings]
[*Table Break]
;mode=option
;selection_mini=true
mariko:
json_file_source './RAM/RAM Lat M.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 88 '{json_file_source(*,dec)}000'
{json_file_source(*,command)} /atmosphere/kips/hoc.kip CUST 88 '{json_file_source(*,hex)}'
set-footer '{json_file_source(*,label)}'
back
erista:
json_file_source './RAM/RAM Lat E.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 88 '{json_file_source(*,dec)}'
{json_file_source(*,command)} /atmosphere/kips/hoc.kip CUST 88 '{json_file_source(*,hex)}'
set-footer '{json_file_source(*,label)}'
back

[Low T6 tRTW]
;mode=trackbar
;min_value=0
;max_value=9
;unlocked=true
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 92 {value}
[Low T7 tWRT]
;mode=trackbar
;min_value=0
;max_value=9
;unlocked=true
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 96 {value}

[1333WL t2 RP Cap]
;mode=trackbar
;min_value=0
;max_value=8
;unlocked=true
hex-by-custom-offset /atmosphere/kips/hoc.kip CUST 84 {json_file_source(*,hex)}

[T6 tRTW Fine Tune]
;mode=named_step_trackbar
;unlocked=true
json_file_source './RAM/Tune T6.json' name
hex-by-custom-offset /atmosphere/kips/hoc.kip CUST 424 {json_file_source(*,hex)}
[T7 tWRT Fine Tune]
;mode=named_step_trackbar
;unlocked=true
json_file_source './RAM/Tune T7.json' name
hex-by-custom-offset /atmosphere/kips/hoc.kip CUST 428 {json_file_source(*,hex)}







