hex-by-custom-offset /atmosphere/kips/hoc.kip CUST 536 {json_file_source(*,hex)}

[T2 RP Cap (1333 WL)]
;mode=trackbar
;min_value=0
;max_value=8
;unlocked=true
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 76 {value}


[Gap]
;mode=table
;background=false
;gap=20

[Header]
;mode=table
;background=false
;header_indent=true
;polling=true
;info_text_color=#AAAAAA
;gap=17
hex_file '/atmosphere/kips/hoc.kip'
json_file '/switch/.packages/Ultra Tuner/Data/Presets/Boot Jsons/RAM Timings.json'
'Low Freqs Timings'= '({json_file(0,{hex_file(CUST,84,1)})}-{json_file(0,{hex_file(CUST,88,1)})}-{json_file(0,{hex_file(CUST,92,1)})}) {json_file(0,{hex_file(CUST,96,1)})}-{json_file(0,{hex_file(CUST,100,1)})}-{json_file(0,{hex_file(CUST,104,1)})}-{json_file(0,{hex_file(CUST,108,1)})}-{json_file(0,{hex_file(CUST,112,1)})}'

[*Table Break]
;mode=option
;selection_mini=true
mariko:
json_file_source './RAM/RAM Lat M.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 80 '{json_file_source(*,dec)}000' 6
set-footer '{json_file_source(*,label)}'
back
erista:
