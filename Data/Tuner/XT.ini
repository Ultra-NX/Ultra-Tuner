;color=#FF0066
;show_widget=true



[@RAM]





[Advanced Settings]

[T6 tRTW Fine Tune]
;mode=named_step_trackbar
;unlocked=true
json_file_source './RAM/Tune T6.json' name
hex-by-custom-offset /atmosphere/kips/hoc.kip CUST 532 {json_file_source(*,hex)}
[T7 tWRT Fine Tune]
;mode=named_step_trackbar
;unlocked=true
