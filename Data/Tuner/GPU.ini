;color=#33FF33
;show_widget=true



[@GPU]

[Gap]
;mode=table
;background=false
;gap=5

[Header]
;mode=table
;background=false
;header_indent=true
;gap=17
'GPU'= 'Info {DRIGHT}'


[*Custom Table]
;mode=forwarder
package_source './UV3.ini'
exec UV3


[Undervolt Mode?GPU]
;mode=named_step_trackbar
;unlocked=true
mariko:
json_file_source './GPU/GPU UV M.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 208 {json_file_source(*,dec)}
erista:
json_file_source './GPU/GPU UV E.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 200 {json_file_source(*,dec)}


[*Min Voltage?GPU]
;mode=option
;selection_mini=true
mariko:
json_file_source './GPU/GPU vMin M.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 212 {json_file_source(*,dec)} 4
set-footer '{json_file_source(*,label)}'
back
erista:
json_file_source './GPU/GPU vMin E.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 204 {json_file_source(*,dec)} 4
set-footer '{json_file_source(*,label)}'
back


[*Max Voltage?GPU]
;system=mariko
;mode=option
;selection_mini=true
json_file_source './GPU/GPU vMax.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 216 {json_file_source(*,dec)}
set-footer '{json_file_source(*,dec)} mV'
back


[Voltage Offset?GPU]
;mode=named_step_trackbar
;unlocked=true
json_file_source './GPU/GPU Off.json' name
hex-by-custom-offset /atmosphere/kips/hoc.kip CUST 220 {json_file_source(*,hex)}


[Gap]
;mode=table
;background=false
;gap=25

[Header]
;mode=table
;background=false
;header_indent=true
;gap=17
;spacing=5
'Applied immediately' = ''
'' = 'Raises GPU voltage with RAM frequency'

[Min Volt → Max RAM?GPU]
;system=mariko
;mode=toggle
on:
    set-ini-val '/config/horizon-oc/config.ini' values dvfs_mode 1
off:
    set-ini-val '/config/horizon-oc/config.ini' values dvfs_mode 0

[Min Volt → Max RAM Offset?GPU]
;system=mariko
;mode=named_step_trackbar
;unlocked=true
json_file_source './GPU/GPU DVFS.json' name
set-ini-val '/config/horizon-oc/config.ini' values dvfs_offset {json_file_source(*,dec)}
set-ini-val '/config/horizon-oc/config.ini' values dvfs_mode 1





[@Info]

[Gap]
;mode=table
;background=false
;gap=5

[Info]
;mode=table
;spacing=4
;gap=30
'Undervolt Mode:' = ''
' ' = 'Higher value - lower consumption                  '

[Info]
;mode=table
;spacing=4
;gap=30
'Min Voltage:' = ''
' ' = 'If "Auto" - will be used “Speedo Min Volt”       '

[Info]
;mode=table
;system=mariko
;spacing=4
;gap=30
'Max Voltage:'='Affects the maximum frequency'

[Info]
;mode=table
;spacing=4
;gap=30
