;color=#33FF33
;show_widget=true



[@GPU]

[Gap]
;mode=table
;background=false
;gap=5

[Header]
;mode=table
;background=false
;header_indent=true
;gap=17
'GPU'= 'Info {DRIGHT}'


[*Custom Table]
;mode=forwarder
package_source './UV3.ini'
exec UV3


[Undervolt Mode?GPU]
;mode=named_step_trackbar
;unlocked=true
mariko:
json_file_source './GPU/GPU UV M.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 144 {json_file_source(*,dec)}
erista:
json_file_source './GPU/GPU UV E.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 136 {json_file_source(*,dec)}


[Min Volt → Max RAM Offset?GPU]
;system=mariko
;mode=named_step_trackbar
;unlocked=true
json_file_source './GPU/GPU DVFS.json' name
set-ini-val '/config/horizon-oc/config.ini' values dvfs_offset {json_file_source(*,dec)}
set-ini-val '/config/horizon-oc/config.ini' values dvfs_mode 1


[Voltage Offset?GPU]
;mode=named_step_trackbar
;unlocked=true
json_file_source './GPU/GPU Off.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 156 {json_file_source(*,dec)}


[*Min Voltage?GPU]
;mode=option
;selection_mini=true
mariko:
json_file_source './GPU/GPU vMin M.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 148 {json_file_source(*,dec)} 4
set-footer '{json_file_source(*,label)}'
back
erista:
json_file_source './GPU/GPU vMin E.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 140 {json_file_source(*,dec)} 4
set-footer '{json_file_source(*,label)}'
back


[*Max Voltage?GPU]
;system=mariko
;mode=option
;selection_mini=true
json_file_source './GPU/GPU vMax.json' name
hex-by-custom-rdecimal-offset /atmosphere/kips/hoc.kip CUST 152 {json_file_source(*,dec)}
set-footer '{json_file_source(*,dec)} mV'
back





[@Info]

[Gap]
;mode=table
;background=false
;gap=5

[Info]
;mode=table
;spacing=4
;gap=30
'Undervolt Mode:' = ''
' ' = 'Higher value - lower consumption                  '

[Info]
;mode=table
;system=mariko
;spacing=4
;gap=30
'Min Volt → Max RAM Offset:' = ''
' ' = 'Changes Min Volt GPU for Max RAM MHz      '
' ' = 'Works if GPU DVFS is enabled in sys-clk       '

[Info]
;mode=table
;spacing=4
;gap=30
'Voltage Offset:' = ''
' ' = 'Reduces voltages by the set value                  '
' ' = 'Does not work on custom voltages               '

[Info]
;mode=table
;spacing=4
;gap=30
'Min Voltage:' = ''
' ' = 'If "Auto" - will be used “Speedo Min Volt”       '

[Info]
;mode=table
;system=mariko
;spacing=4
;gap=30
'Max Voltage:'='Affects the maximum frequency'


